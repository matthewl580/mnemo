name: Web API CI

on:
  push:
    branches:
      - main
      - master
      - release/**
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Web project
        run: dotnet restore Mnemo.Web/Mnemo.Web.csproj

      - name: Build Web project
        run: dotnet build Mnemo.Web/Mnemo.Web.csproj -c Release --no-restore

      - name: Publish Web project
        run: dotnet publish Mnemo.Web/Mnemo.Web.csproj -c Release -o publish --no-restore

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnemo-web-publish
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore and publish for deployment
        run: |
          dotnet restore Mnemo.Web/Mnemo.Web.csproj
          dotnet publish Mnemo.Web/Mnemo.Web.csproj -c Release -o publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
